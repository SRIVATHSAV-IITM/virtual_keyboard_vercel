<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaze-Controlled Virtual Keyboard (Vercel Ready)</title>
    <link rel="stylesheet" href="style.css">
    <!-- MediaPipe Face Mesh -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>
    <div id="app-container">
        <!-- Hidden video element for MediaPipe -->
        <video id="webcam" style="display:none;" autoplay playsinline></video>
        
        <!-- Text Area -->
        <div id="text-area-container">
            <textarea id="main-textarea" readonly placeholder="Start typing..."></textarea>
            <div id="custom-cursor"></div>
        </div>

        <!-- Suggestion Bar -->
        <div id="suggestion-bar">
            <!-- Suggestions will be injected here -->
        </div>

        <!-- Keyboard Area -->
        <div id="keyboard-container">
            <!-- Keyboard rows will be injected here -->
        </div>

        <!-- File Save Prompt Overlay (hidden by default) -->
        <div id="save-prompt-overlay" class="hidden">
            <div id="save-prompt-box">
                <h3>Enter file name:</h3>
                <input type="text" id="filename-input" readonly>
                <p>Use the keyboard to type and 'Enter' to save.</p>
            </div>
        </div>

        <!-- Gaze Pointer -->
        <div id="gaze-pointer"></div>
    </div>

    <!-- Application scripts -->
    <script src="wordlist.js"></script>
    <script src="script.js"></script>
</body>
</html>
